<!DOCTYPE html> 
<html lang="fr">
          <head> 
                  <meta charset="UTF-8"> 
                  <title>Ajouter un Examen</title>
          </head> 
          <body>
                   <h1>Créer un nouvel examen</h1> 
                   <form id="form-examen">
                           <!-- Champ : nom de l'examen --> 
                        <input type="text" id="nom" placeholder="Nom examen" required>
                           <!-- Champ : durée en minutes --> 
                        <input type="text" id="duree" placeholder="durée " required>
                           <!-- Zone de texte : description --> 
                        <textarea id="description" placeholder="Description "></textarea>
                           <!-- Champ : nom du propriétaire --> 
                        <input type="text" id="proprietaire" placeholder="Nom proprietaire " required> 
                            <button type="submit">Ajouter l'examen</button> 
                   </form>
                  <!-- Lier le fichier JavaScript --> 
                  <script src="script.js"></script>
         </body>
 </html>
