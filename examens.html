<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des examens</title>
</head>
<body>

    <h1>Examens enregistrés</h1>

    <input type="text" id="proprietaire" placeholder="Nom du propriétaire">

    <button id="afficher">Afficher</button>

    <div id="resultat"></div>

    <script>

    document.getElementById('afficher').addEventListener('click', () => {

        // Lire le nom du propriétaire
        const proprietaire =
            document.getElementById('proprietaire')
            .value
            .trim()
            .toLowerCase();

        // Construire la clé localStorage
        const key = 'examens_' + proprietaire;

        // Récupérer les examens
        const exams =
            JSON.parse(localStorage.getItem(key)) || [];

        // Zone résultat
        const resultat =
            document.getElementById('resultat');

        // Vider ancien affichage
        resultat.innerHTML = '';

        // Aucun examen
        if (exams.length === 0) {

            resultat.innerHTML =
                '<p>Aucun examen trouvé.</p>';

            return;

        }

        // Afficher les examens
        exams.forEach((exam, i) => {

            const titre =
                document.createElement('h2');

            titre.textContent =
                `Examen ${i + 1} : ${exam.nom}`;

            resultat.appendChild(titre);

            // Liste questions
            const ul =
                document.createElement('ul');

            exam.questions.forEach(q => {

                const li =
                    document.createElement('li');

                li.textContent =
                    `${q.question} - ${q.points} points`;

                ul.appendChild(li);

            });

            resultat.appendChild(ul);

        });

    });

</script>

</body>
</html>
