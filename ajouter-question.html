<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter une question</title>
</head>
<body>

    <h1>Ajouter une question à un examen</h1>

    <form id="form-question">

        <!-- Champ : nom du propriétaire -->
        <label>Nom du propriétaire :</label>
        <input type="text" id="proprietaire" required>
        <br><br>

        <!-- Champ : nom de l'examen -->
        <label>Nom de l'examen :</label>
        <input type="text" id="examen" required>
        <br><br>

        <!-- Énoncé de la question -->
        <label>Question :</label>
        <textarea id="question" required></textarea>
        <br><br>

        <!-- Durée en secondes -->
        <label>Durée (secondes) :</label>
        <input type="number" id="duree" required>
        <br><br>

        <!-- Points -->
        <label>Points :</label>
        <input type="number" id="points" required>
        <br><br>

        <!-- Conteneur pour les propositions -->
        <div id="propositions"></div>

        <!-- Bouton pour ajouter une proposition -->
        <button type="button" id="ajouter-proposition">
            Ajouter une proposition
        </button>

        <br><br>

        <button type="submit">Ajouter la question</button>

    </form>

    <script src="ajouter-question.js"></script>

</body>
</html>
